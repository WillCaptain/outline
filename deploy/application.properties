# ═══════════════════════════════════════════════════════════════
#  Outline Playground — application.properties
#  修改此文件后重启服务生效：  sudo systemctl restart outline-playground
# ═══════════════════════════════════════════════════════════════

# ── 服务端口 ──────────────────────────────────────────────────
server.port=8080
# 若使用 Nginx 反向代理，建议改为只监听本地：
# server.address=127.0.0.1

# ── 应用名 ───────────────────────────────────────────────────
spring.application.name=outline-playground

# ── 超时（首次请求会编译语法文件，需要较长时间）───────────────
spring.mvc.async.request-timeout=30000

spring.jackson.serialization.indent-output=false

# ═══════════════════════════════════════════════════════════════
#  SQLite 数据库
#  数据库文件默认保存在 /opt/outline-playground/data/ 目录
#  若修改路径，请确保该目录存在且 Java 进程有写权限
# ═══════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:sqlite:/Users/imac/Documents/code/github/outline/deploy/data/playground.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=1

# ═══════════════════════════════════════════════════════════════
#  阿里云短信服务（SMS）
#
#  1. 登录 https://ram.console.aliyun.com 创建 RAM 子账户
#     赋予 AliyunDysmsFullAccess 权限，获取 AccessKey ID/Secret
#  2. 在短信服务控制台申请签名（sign-name）和模板（template-code）
#     模板内容示例：您的验证码为 ${code}，5分钟内有效，请勿泄露。
#  3. 将 enabled 改为 true 以启用真实短信发送
#
#  enabled=false 时：验证码会显示在登录弹窗的橙色框内（仅供开发测试）
# ═══════════════════════════════════════════════════════════════
aliyun.sms.enabled=false

# ── Entitir Playground 后端地址（反代用）────────────────────────
entitir.backend-url=http://localhost:8081
aliyun.sms.access-key-id=YOUR_ACCESS_KEY_ID
aliyun.sms.access-key-secret=YOUR_ACCESS_KEY_SECRET
aliyun.sms.sign-name=YOUR_SIGN_NAME
aliyun.sms.template-code=YOUR_TEMPLATE_CODE
