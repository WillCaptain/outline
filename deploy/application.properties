server.port=8080
spring.application.name=outline-playground

# Increase timeout for slow first parse (grammar compilation)
spring.mvc.async.request-timeout=30000

spring.jackson.serialization.indent-output=false

# ── Optional overrides ──────────────────────────────────────────
# Uncomment and set to change the listening port:
# server.port=9090

# Uncomment to bind to a specific network interface only:
# server.address=127.0.0.1

# Share token storage directory (absolute path, must be writable)
# share.storage.dir=/var/data/playground/shares

# Examples JSON file path (leave blank to use the bundled file)
# examples.file.path=/var/data/playground/examples.json
