server.port=8080
spring.application.name=outline-playground

# Increase timeout for slow first parse (grammar compilation)
spring.mvc.async.request-timeout=30000

# Pretty-print JSON for easier debugging
spring.jackson.serialization.indent-output=false

# ── SQLite datasource ────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:${user.home}/outline-playground.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
# Disable HikariCP's auto-commit override (SQLite needs this)
spring.datasource.hikari.auto-commit=true
# SQLite does not support multiple connections well; keep pool size = 1
spring.datasource.hikari.maximum-pool-size=1

# ── Alibaba Cloud SMS ────────────────────────────────────────────
# Fill in your AccessKey from https://ram.console.aliyun.com/
aliyun.sms.access-key-id=YOUR_ACCESS_KEY_ID
aliyun.sms.access-key-secret=YOUR_ACCESS_KEY_SECRET
# SMS signature (must match the approved signature on the Aliyun console)
aliyun.sms.sign-name=YOUR_SIGN_NAME
# Template code (e.g. SMS_123456789) — template content must contain ${code}
aliyun.sms.template-code=YOUR_TEMPLATE_CODE
# Set to true in production to actually call Aliyun; false = dev mock mode
aliyun.sms.enabled=false
